async function sbReq(path, opts={}) {
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers:{"apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`,"Content-Type":"application/json","Prefer":opts.prefer??"return=representation",...(opts.headers||{})},
    method:opts.method||"GET", body:opts.body
  });
  const t = await r.text();
  if(!r.ok) throw new Error(t);
  return t ? JSON.parse(t) : [];
}

function mapTrade(t){return{...t,imgs:[t.img_big||null,t.img_entry||null,t.img_exit||null],propAccount:t.prop_account||"",confluences:Array.isArray(t.confluences)?t.confluences:[],rulebased:t.rulebased!==false,r:parseFloat(t.r)||0};}

function calcStats(trades){
  if(!trades.length)return{wr:0,pf:0,totalR:0,avgR:0,wins:0,losses:0};
  const wins=trades.filter(t=>t.result==="WIN"),losses=trades.filter(t=>t.result==="LOSS"),valid=trades.filter(t=>t.result!=="BE");
  const wr=valid.length?wins.length/valid.length*100:0;
  const gW=wins.reduce((s,t)=>s+t.r,0),gL=Math.abs(losses.reduce((s,t)=>s+t.r,0));
  const pf=gL>0?gW/gL:gW>0?99:0,totalR=trades.reduce((s,t)=>s+t.r,0);
  return{wr:+wr.toFixed(1),pf:+pf.toFixed(2),totalR:+totalR.toFixed(2),avgR:+(totalR/trades.length).toFixed(2),wins:wins.length,losses:losses.length};
}

function renderDashboard(){

  for(const t of state.trades){if(t.result==="BE")break;if(!streakType)streakType=t.result;if(t.result===streakType)streak++;else break;}
  const streakColor = streakType==="WIN"?"#4ade80":streakType==="LOSS"?"#f87171":"#6b6880";
  const totalPayout = state.accounts.reduce((s,a)=>s+a.totalPayout,0);

    {label:"Streak",value:streak>0?`${streak}× ${streakType}`:"–",color:streakColor},

  const accountCards = state.accounts.map(a=>{
    const phaseColor=a.phase==="Funded"?"#4ade80":a.phase==="Phase 2"?"#60a5fa":"#fbbf24";
    const pp=Math.min((a.currentProfit/a.profitTarget*100)||0,100);

        <div style="flex:1"><div style="color:#6b6880;font-size:9px;margin-bottom:2px">Profit ${a.currentProfit}%/${a.profitTarget}%</div><div style="background:#2a2a3a;border-radius:3px;height:5px"><div style="width:${pp}%;height:100%;background:#4ade80;border-radius:3px"></div></div></div>
        <div style="flex:1"><div style="color:#6b6880;font-size:9px;margin-bottom:2px">DD ${a.currentDD}%/${a.ddLimit}%</div><div style="background:#2a2a3a;border-radius:3px;height:5px"><div style="width:${dp}%;height:100%;background:${dp>70?"#f87171":dp>50?"#fbbf24":"#4ade80"};border-radius:3px"></div></div></div>
      </div>
    </div>`;
  }).join("");

  const recentTrades = state.trades.slice(0,5).map(t=>`
    <div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:#111119;border-radius:8px;font-size:12px;flex-wrap:wrap">

      <span class="mono" style="margin-left:auto;color:${t.r>0?"#4ade80":t.r<0?"#f87171":"#6b6880"}">${t.r>0?"+":""}${t.r}R</span>

function renderMental(){
  const sliders=[["schlaf","😴 Schlaf"],["energie","⚡ Energie"],["fokus","🎯 Fokus"],["stress","😤 Stress (niedrig = gut)"],["motivation","🔥 Motivation"],["koerper","💪 Körper"]];
  const vals = state.mentalVals || {schlaf:7,energie:7,fokus:7,stress:3,motivation:8,koerper:7};
  const pos=["schlaf","energie","fokus","motivation","koerper"];
  const pScore=pos.reduce((s,k)=>s+vals[k],0)/pos.length;
  const score=((pScore+(11-vals.stress))/2).toFixed(1);
  const light=score>=7?"green":score>=5?"yellow":"red";
  const msg=score>=7?"✓ Grünes Licht — du bist ready to trade.":score>=5?"! Gelb — trade kleiner oder sei extra diszipliniert.":"✗ Rot — heute lieber kein Trading.";
  const lightColor=light==="green"?"#4ade80":light==="yellow"?"#fbbf24":"#f87171";

  return `<div style="display:flex;flex-direction:column;gap:16px;max-width:600px">
    <div class="card">
      <div class="slabel">Tages Check-in</div>
      ${sliders.map(([k,l])=>`<div style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="color:#e8e4dc;font-size:13px">${l}</span>
          <span class="mono" style="color:#c8a96e;font-size:14px" id="val_${k}">${vals[k]} / 10</span>
        </div>
        <input type="range" min="1" max="10" value="${vals[k]}" oninput="updateSlider('${k}',this.value)">
      </div>`).join("")}
      <div style="margin-top:16px"><div style="color:#6b6880;font-size:10px;margin-bottom:6px">Notizblock</div>
      <textarea id="mental_note" rows="4" class="inp" style="resize:vertical" placeholder="Sport? Schritte? Stress im Job? Das alles beeinflusst dein Trading..."></textarea></div>
      <button class="btn btn-accent" style="margin-top:12px" onclick="saveMental()">Check-in speichern</button>
    </div>
    <div style="padding:20px 24px;background:#15151f;border:2px solid ${lightColor}33;border-radius:12px">
      <div style="display:flex;align-items:center;gap:14px">
        <div style="width:48px;height:48px;border-radius:50%;background:${lightColor};display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${light==="green"?"✓":light==="yellow"?"!":"✗"}</div>
        <div><div style="color:#e8e4dc;font-weight:700;font-size:16px;margin-bottom:4px">Mental Score: ${score} / 10</div><div style="color:#6b6880;font-size:13px">${msg}</div></div>

    </div>
  </div>`;
}

function renderStatistik(){
  const fs = state.filterStatStrat||"ALL";
  const fq = state.filterStatQuality||"ALL";
  const filtered = state.trades.filter(t=>(fs==="ALL"||t.strategy===fs)&&(fq==="ALL"||t.quality===fq));
  const stats = calcStats(filtered);
  const byDay = ["Mo","Di","Mi","Do","Fr"].map((d,i)=>{const map={Mo:1,Di:2,Mi:3,Do:4,Fr:5};const t=filtered.filter(x=>new Date(x.date).getDay()===map[d]);return{day:d,r:+calcStats(t).totalR,n:t.length};});
  const byStrategy = STRATEGIES.map(s=>{const t=filtered.filter(x=>x.strategy===s);const st=calcStats(t);return{name:s,...st,n:t.length};}).filter(s=>s.n>0);

  const statCards = [
    {label:"Win Rate",value:`${stats.wr}%`,color:"#c8a96e"},
    {label:"Profit Factor",value:stats.pf,color:"#60a5fa"},
    {label:"Gesamt R",value:`${stats.totalR}R`,color:stats.totalR>0?"#4ade80":"#f87171"},
    {label:"Ø R/Trade",value:stats.avgR,color:stats.avgR>0?"#4ade80":"#f87171"},
  ].map(s=>`<div style="background:#111119;border:1px solid #1f1f2e;border-radius:10px;padding:14px 18px;flex:1;min-width:130px"><div style="color:#6b6880;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:5px">${s.label}</div><div class="mono" style="color:${s.color};font-size:22px">${s.value}</div></div>`).join("");

  const maxR = Math.max(...byDay.map(d=>Math.abs(d.r)),1);

  return `<div style="display:flex;flex-direction:column;gap:14px">
    <div class="card">
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <div style="color:#6b6880;font-size:10px">Filter:</div>
        <select style="background:#111119;border:1px solid #1f1f2e;border-radius:6px;padding:5px 9px;color:#e8e4dc;font-size:11px;font-family:inherit" onchange="setState({filterStatStrat:this.value})">
          <option value="ALL">Alle Strategien</option>${STRATEGIES.map(s=>`<option ${fs===s?"selected":""}>${s}</option>`).join("")}
        </select>
        <select style="background:#111119;border:1px solid #1f1f2e;border-radius:6px;padding:5px 9px;color:#e8e4dc;font-size:11px;font-family:inherit" onchange="setState({filterStatQuality:this.value})">
          ${["ALL","A+","B","C"].map(q=>`<option value="${q}" ${fq===q?"selected":""}>${q==="ALL"?"Alle Qualitäten":q}</option>`).join("")}
        </select>
        <span style="color:#6b6880;font-size:10px">${filtered.length} Trades</span>
      </div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">${statCards}</div>
    <div class="grid2">
      <div class="card">
        <div class="slabel">P&L nach Wochentag</div>
        <div style="display:flex;gap:8px;align-items:flex-end;height:120px;padding:10px 0">
          ${byDay.map(d=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
            <div style="font-size:10px;color:#6b6880;font-family:'DM Mono',monospace">${d.r>0?"+":""}${d.r}R</div>
            <div style="width:100%;height:${Math.max(4,Math.abs(d.r)/maxR*80)}px;background:${d.r>0?"#4ade80":d.r<0?"#f87171":"#2a2a3a"};border-radius:3px 3px 0 0;min-height:4px"></div>
            <div style="color:#6b6880;font-size:10px">${d.day}</div>
          </div>`).join("")}
        </div>
      </div>
      <div class="card">
        <div class="slabel">Performance pro Strategie</div>
        <div style="display:flex;flex-direction:column;gap:7px">
          ${byStrategy.map(s=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:#111119;border-radius:8px">
            <span style="color:#e8e4dc;font-weight:600;font-size:11px;min-width:100px">${s.name.replace(" Hunter","")}</span>
            <span style="color:#6b6880;font-size:9px">WR</span><span style="color:#c8a96e;font-weight:700;font-size:11px">${s.wr}%</span>
            <span style="color:#6b6880;font-size:9px">PF</span><span style="color:#60a5fa;font-weight:700;font-size:11px">${s.pf}</span>
            <span style="color:${s.totalR>0?"#4ade80":"#f87171"};font-weight:700;font-size:11px;margin-left:auto">${s.totalR>0?"+":""}${s.totalR}R</span>
          </div>`).join("")||'<div style="color:#6b6880;font-size:12px">Noch keine Daten</div>'}
        </div>
      </div>
    </div>
  </div>`;
}

function renderKalkulator(){
  const mode = state.kalcMode||"CFD";
  const cfg = state.kalcCfg||{accountSize:100000,challengeCost:540,attempts:1,totalPayout:0,split:80,winRate:55,riskPct:1,rrRatio:2,ddLimit:10,profitTarget:10};
  const {challengeCost,attempts,totalPayout,winRate,riskPct,rrRatio,ddLimit,profitTarget}=cfg;
  const totalInvested=challengeCost*attempts,net=totalPayout-totalInvested;
  const roi=totalInvested>0?((net/totalInvested)*100).toFixed(1):0;
  const avgTradeR=(winRate/100*riskPct*rrRatio)-((1-winRate/100)*riskPct);
  const tradesNeeded=Math.ceil(profitTarget/Math.max(avgTradeR,0.01));
  const maxLosses=Math.floor(ddLimit/riskPct);
  const passChance=Math.max(0,Math.min(99,riskPct<=1?75:riskPct<=2?55:riskPct<=3?35:15));
  const risks=[0.25,0.5,0.75,1,1.25,1.5,1.75,2,2.5,3,4,5];
  const maxScore=Math.max(...risks.map(r=>{const ev=(winRate/100*(r*rrRatio))-((1-winRate/100)*r);const p=Math.floor(ddLimit/r);return Math.max(0,ev*Math.min(p/5,1));}),0.01);

  return `<div style="display:flex;flex-direction:column;gap:14px">
    <div style="display:flex;gap:8px">
      ${["CFD","Futures"].map(m=>`<button style="background:${mode===m?"#c8a96e":"transparent"};color:${mode===m?"#000":"#6b6880"};border:1px solid ${mode===m?"#c8a96e":"#1f1f2e"};border-radius:7px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit" onclick="setState({kalcMode:'${m}'})">${m} Prop Firm</button>`).join("")}
    </div>
    <div class="grid2">
      <div class="card">
        <div class="slabel">${mode==="CFD"?"CFD Settings (z.B. FTMO)":"Futures Settings (z.B. Tradeify)"}</div>
        <div style="display:flex;flex-direction:column;gap:9px">
          ${[["Account Size","accountSize"],["Challenge Kosten (€)","challengeCost"],["Anzahl Versuche","attempts"],["Ausgezahlte Payouts (€)","totalPayout"],["Payout Split (%)","split"],["DD Limit (%)","ddLimit"],["Profit Target (%)","profitTarget"]].map(([l,k])=>`<div style="display:flex;justify-content:space-between;align-items:center"><span style="color:#6b6880;font-size:12px">${l}</span><input type="number" value="${cfg[k]}" oninput="updateKalc('${k}',this.value)" style="width:110px;background:#111119;border:1px solid #1f1f2e;border-radius:6px;padding:5px 8px;color:#e8e4dc;font-size:12px;text-align:right;font-family:inherit"></div>`).join("")}
        </div>
      </div>
      <div class="card">
        <div class="slabel">Strategie-Risikoprofil</div>
        <div style="display:flex;flex-direction:column;gap:12px">
          ${[["Win Rate (%)","winRate",30,80,1],["Risk pro Trade (%)","riskPct",0.25,5,0.25],["RR Ratio","rrRatio",1,5,0.25]].map(([l,k,min,max,step])=>`<div>
            <div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="color:#e8e4dc;font-size:12px">${l}</span><span class="mono" style="color:#c8a96e;font-size:14px">${cfg[k]}${k==="rrRatio"?"":"%"}</span></div>
            <input type="range" min="${min}" max="${max}" step="${step}" value="${cfg[k]}" oninput="updateKalc('${k}',this.value)">
          </div>`).join("")}
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">
            <div style="background:#111119;border-radius:8px;padding:10px 12px"><div style="color:#6b6880;font-size:9px">Max Verluste bis DD</div><div class="mono" style="color:${maxLosses<5?"#f87171":maxLosses<8?"#fbbf24":"#4ade80"};font-size:22px">${maxLosses}×</div></div>
            <div style="background:#111119;border-radius:8px;padding:10px 12px"><div style="color:#6b6880;font-size:9px">Ø EV/Trade</div><div class="mono" style="color:${avgTradeR>0?"#4ade80":"#f87171"};font-size:22px">${avgTradeR.toFixed(2)}%</div></div>
          </div>
        </div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px">
      ${[["Gesamt investiert",`€${totalInvested.toLocaleString()}`,"#f87171"],["Ausgezahlt",`€${totalPayout.toLocaleString()}`,"#4ade80"],["Netto P&L",`${net>=0?"+":""}€${net.toLocaleString()}`,net>=0?"#4ade80":"#f87171"],["ROI",`${roi}%`,parseFloat(roi)>=0?"#4ade80":"#f87171"],["Pass-Chance",`~${passChance}%`,passChance>=60?"#4ade80":passChance>=40?"#fbbf24":"#f87171"],["Trades für Target",`~${tradesNeeded}`,"#60a5fa"]].map(([l,v,c])=>`<div style="background:#111119;border:1px solid #1f1f2e;border-radius:10px;padding:14px 18px"><div style="color:#6b6880;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:5px">${l}</div><div class="mono" style="color:${c};font-size:20px">${v}</div></div>`).join("")}
    </div>
    <div class="card">
      <div class="slabel">Optimaler Risk-Bereich bei ${ddLimit}% DD Limit</div>
      <div style="display:flex;gap:3px;align-items:flex-end;height:80px">
        ${risks.map(r=>{const ev=(winRate/100*(r*rrRatio))-((1-winRate/100)*r);const p=Math.floor(ddLimit/r);const score=Math.max(0,ev*Math.min(p/5,1));const col=r<=1?"#4ade80":r<=2?"#fbbf24":"#f87171";return`<div onclick="updateKalc('riskPct','${r}')" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer">
          <div style="width:100%;height:${Math.max(4,score/maxScore*60)}px;background:${col};border-radius:3px 3px 0 0;opacity:${r==riskPct?1:0.4};border:${r==riskPct?"2px solid #fff":"none"}"></div>
          <span style="color:${r==riskPct?"#c8a96e":"#6b6880"};font-size:8px">${r}%</span>
        </div>`;}).join("")}
      </div>
      <div style="margin-top:6px;font-size:10px;color:#6b6880">🟢 Optimal &nbsp;🟡 Akzeptabel &nbsp;🔴 Zu aggressiv — Klicken zum Auswählen</div>
    </div>
  </div>`;
}

// Event handlers
function attachEvents(){}

function updateSlider(key, val){
  if(!state.mentalVals) state.mentalVals={schlaf:7,energie:7,fokus:7,stress:3,motivation:8,koerper:7};
  state.mentalVals[key]=parseInt(val);
  const el=document.getElementById(`val_${key}`);
  if(el) el.textContent=`${val} / 10`;
  // update score display
  const vals=state.mentalVals;
  const pos=["schlaf","energie","fokus","motivation","koerper"];
  const pScore=pos.reduce((s,k)=>s+vals[k],0)/pos.length;
  const score=((pScore+(11-vals.stress))/2).toFixed(1);
  const light=score>=7?"green":score>=5?"yellow":"red";
  const lightColor=light==="green"?"#4ade80":light==="yellow"?"#fbbf24":"#f87171";
  const msg=score>=7?"✓ Grünes Licht — du bist ready to trade.":score>=5?"! Gelb — trade kleiner.":"✗ Rot — heute lieber kein Trading.";
}

function updateStrategy(val){
  state.formData.strategy=val;
  state.formData.instrument=(INSTRUMENTS[val]||[])[0]||"";
  render();
}

function toggleConf(c){
  if(!state.formData.confluences) state.formData.confluences=[];
  if(state.formData.confluences.includes(c)) state.formData.confluences=state.formData.confluences.filter(x=>x!==c);
  else state.formData.confluences=[...state.formData.confluences,c];
  render();
}

function toggleCheck(k){
  state.checkedItems={...state.checkedItems,[k]:!state.checkedItems[k]};
  render();
}

function resetChecklist(strat){
  const keys=Object.keys(state.checkedItems).filter(k=>k.startsWith(strat));
  keys.forEach(k=>delete state.checkedItems[k]);
  render();
}

function viewTrade(id){const t=state.trades.find(x=>x.id===id);if(t)setState({viewTrade:t});}

function startEdit(){
  if(!state.viewTrade)return;
  const t=state.viewTrade;
  state.formData={...t,r:String(t.r),entry:String(t.entry||""),sl:String(t.sl||""),tp:String(t.tp||"")};
  setState({showForm:true,editMode:true});
}

function editTradeById(id){
  const t=state.trades.find(x=>x.id===id);
  if(!t)return;
  state.formData={...t,r:String(t.r),entry:String(t.entry||""),sl:String(t.sl||""),tp:String(t.tp||"")};
  setState({showForm:true,editMode:true,viewTrade:null});
}

function getFormData(){
  const g=id=>document.getElementById(id)?.value||"";
  const gc=id=>document.getElementById(id)?.checked;
  return {
    date:g("f_date"),time:g("f_time"),instrument:g("f_instrument"),strategy:g("f_strategy"),
    session:g("f_session"),direction:g("f_direction"),entry:parseFloat(g("f_entry"))||0,
    sl:parseFloat(g("f_sl"))||0,tp:parseFloat(g("f_tp"))||0,result:g("f_result"),
    r:parseFloat(g("f_r"))||0,quality:g("f_quality"),rulebased:gc("f_rulebased"),
    confluences:state.formData?.confluences||[],emotion:g("f_emotion"),notes:g("f_notes"),
    imgs:[g("f_img0")||null,g("f_img1")||null,g("f_img2")||null],
    propAccount:""
  };
}

async function saveForm(){
  const fd=getFormData();
  if(!fd.r)return;
  const payload={date:fd.date,time:fd.time,instrument:fd.instrument,strategy:fd.strategy,session:fd.session,direction:fd.direction,entry:fd.entry,sl:fd.sl,tp:fd.tp,result:fd.result,r:fd.r,quality:fd.quality,rulebased:fd.rulebased,confluences:fd.confluences,emotion:fd.emotion,notes:fd.notes,img_big:fd.imgs[0],img_entry:fd.imgs[1],img_exit:fd.imgs[2],prop_account:fd.propAccount};
  if(state.editMode&&state.formData?.id){
    try{await db.trades.upd(state.formData.id,payload);const updated=mapTrade({...payload,id:state.formData.id});setState({trades:state.trades.map(t=>t.id===state.formData.id?updated:t),showForm:false,editMode:false,viewTrade:updated});}
    catch(e){alert("Fehler: "+e.message);}
  }else{
    try{const result=await db.trades.add(payload);const saved=Array.isArray(result)?result[0]:result;setState({trades:[mapTrade(saved),...state.trades],showForm:false});}
    catch(e){alert("Fehler: "+e.message);}
  }
}

async function deleteTrade(id){
  if(!confirm("Trade wirklich löschen?"))return;
  try{await db.trades.del(id);setState({trades:state.trades.filter(t=>t.id!==id),viewTrade:null});}
  catch(e){alert("Fehler: "+e.message);}
}

async function saveAccount(){
  const g=id=>document.getElementById(id)?.value||"";
  const riskByPhase={"Phase 1":2.0,"Phase 2":1.5,"Funded":0.75};
  const phase=g("acc_phase");
  const payload={firm:g("acc_firm"),size:parseFloat(g("acc_size"))||100000,phase,currency:g("acc_currency"),challenge_cost:parseFloat(g("acc_cost"))||0,attempts:parseInt(g("acc_attempts"))||1,total_paid:parseFloat(g("acc_paid"))||0,total_payout:parseFloat(g("acc_payout"))||0,dd_limit:parseFloat(g("acc_dd"))||10,profit_target:parseFloat(g("acc_target"))||10,current_profit:parseFloat(g("acc_profit"))||0,current_dd:parseFloat(g("acc_curdd"))||0,risk_phase:riskByPhase[phase]||1,split:parseFloat(g("acc_split"))||80};
  try{const result=await db.accounts.add(payload);const saved=Array.isArray(result)?result[0]:result;setState({accounts:[...state.accounts,mapAccount(saved)],showAddAccount:false});}
  catch(e){alert("Fehler: "+e.message);}
}

async function deleteAccount(id){
  if(!confirm("Konto löschen?"))return;
  try{await db.accounts.del(id);setState({accounts:state.accounts.filter(a=>a.id!==id)});}
  catch(e){alert("Fehler: "+e.message);}
}

async function saveMental(){
  if(!state.mentalVals) state.mentalVals={schlaf:7,energie:7,fokus:7,stress:3,motivation:8,koerper:7};
  const note=document.getElementById("mental_note")?.value||"";
  const payload={date:new Date().toISOString().slice(0,10),...state.mentalVals,note};
  try{await db.mental.add(payload);alert("Check-in gespeichert ✓");}
  catch(e){alert("Fehler: "+e.message);}
}

function updateKalc(key, val){
  if(!state.kalcCfg) state.kalcCfg={accountSize:100000,challengeCost:540,attempts:1,totalPayout:0,split:80,winRate:55,riskPct:1,rrRatio:2,ddLimit:10,profitTarget:10};
  state.kalcCfg[key]=parseFloat(val)||0;
  render();
}

async function init(){
  setState({loading:true,error:null});
  try{
    const [t,a,m]=await Promise.all([db.trades.list(),db.accounts.list(),db.mental.list()]);
    setState({trades:t.map(mapTrade),accounts:a.map(mapAccount),mentalHistory:m||[],loading:false});
  }catch(e){setState({loading:false,error:e.message});}
}

init();
</script>
</body>
</html>
