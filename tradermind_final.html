.check-box{width:18px;height:18px;border-radius:4px;border:2px solid #2a2a3a;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:#000;margin-top:1px;transition:all 0.15s}

.insight-value{color:#e8e4dc;font-size:13px;line-height:1.6}

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const STRATEGIES=["XAU V","SPX/NQ Hunter","BOSS","BTC Trend Follow","Altcoin Ribbon"];
const INSTRUMENTS={"XAU V":["XAUUSD"],"SPX/NQ Hunter":["US500","US100"],"BOSS":["GBPJPY","AUDCAD","USDJPY","GBPUSD"],"BTC Trend Follow":["BTCUSD"],"Altcoin Ribbon":["ALTCOIN (manuell)"]};

const CHECKLISTS={"XAU V":["1.5%+ Expansion in LQ-Zone?","CHoCH klar sichtbar?","FVG auf 1M identifiziert?","FVG auf 5M bestätigt?","Liquidity Grab vorhanden?","Entry im FVG?","Target: gegenüb. Golden Pocket?","Partial bei 1:1 geplant?","Max 1% Risiko gesetzt?"],"SPX/NQ Hunter":["WOCHENTAG: Di/Mi = A+ | Do = nur 15:30–16:00 | Mo/Fr = sehr vorsichtig","FLIP-TAG? Asia H/L + Daily H/L → mehr riskieren, Runner trailen!","15:30–17:30 MEZ? (Entry bis 16:30)","News-Pause OK? (CPI/FOMC/NFP/PCE: 30min vorher)","LQ-Sweep / Liquidity Grab klar?","BOS auf LTF bestätigt?","Bias klar? (Long: Sweep unten+BOS oben)","Instrument mit LQ-Zug gewählt (SPX o. NQ)?","Erst 1 Trade heute?"],"BOSS":["HTF-Bias klar?","Setup auf richtigem Pair?","1:2 RR erreichbar?","Entry-Trigger vorhanden?","Liquidity Grab stattgefunden?","Kein News-Event?","London Session aktiv?"],"BTC Trend Follow":["4H + 1H + 15M aligned?","BOS auf 1H bestätigt?","Liquidity Grab auf LTF?","Entry an Orderblock/GP?","BTC-Trend bullish?","Max 1% Risiko gesetzt?"],"Altcoin Ribbon":["ANALYZER A: Mind. 3/5 TFs aligned? (15M/1H/4H/Daily/Weekly)","KEIN Entry gegen den Trend!","Liquidity Grab vorhanden?","BOS sauber bestätigt?","FVG vorhanden? (idealerweise unter GP)","Entry erst ab Golden Pocket oder später!","ZIEL mit LQ Grab: nächstes High (RR >2)","ZIEL ohne LQ Grab: nur 1:1 RR","Marktcap unter 1 Mrd Dollar?","Coin-Bewegung prüfen (Crypto Bubbles)","Max 1% Risiko gesetzt?"]};
const STRATEGY_INFO={"XAU V":{pair:"XAUUSD",session:"London",rr:"1:2 (Partial 1:1)",wr:"~60%",desc:"Gold-Strategie. 1.5%+ Expansion in LQ-Zone → CHoCH → FVG 1M+5M → Entry. Ziel: gegenüb. Golden Pocket. Partial bei 1:1."},"SPX/NQ Hunter":{pair:"US500 / US100",session:"NY 15:30–17:30 MEZ",rr:"1:2 (A+: voller Runner)",wr:"~55–65%",desc:"Di/Mi = A+ Setup, voller Runner, BE nach 3× 1M-Kerze. Do = nur frühe NY-Beats. Mo/Fr = sehr vorsichtig. Flip-Tage: Asia H/L swept + Daily H/L → 5-10R möglich. Flat 17:30 MEZ."},"BOSS":{pair:"GBPJPY / AUDCAD / USDJPY / GBPUSD",session:"London",rr:"1:2",wr:"~50%",desc:"Forex-Strategie. HTF-Bias als Grundlage, Entry über BOS + Orderblock oder FVG auf LTF. 1:2 RR fixiert."},"BTC Trend Follow":{pair:"BTCUSD",session:"Opportunistisch",rr:"~1:5 (Trendfolge)",wr:"~65%",desc:"BTC Trend-Following auf 15M. 4H+1H+15M aligned. LQ Grab auf LTF als Bestätigung. Entry nach BOS auf 1H an OB oder GP. PF ~5."},"Altcoin Ribbon":{pair:"Altcoins (Crypto)",session:"Opportunistisch (inkl. Wochenende)",rr:"1:1 (ohne LQ) / >2 (mit LQ)",wr:"~60–70%",desc:"Analyzer A: mind. 3/5 TFs aligned (grün/rot). Mit LQ Grab → nächstes High (RR >2). Ohne → nur 1:1. Entry ab Golden Pocket. FVG idealerweise unter GP. Marktcap <1Mrd. Crypto Bubbles prüfen."}};
const INSIGHT_CATS=["Setup-Idee","Trade-Review","Marktbeobachtung","Regelverstoß","Mentale Notiz","Strategie-Anpassung","Flip-Tag-Alarm","News-Event"];

// ── STATE ─────────────────────────────────────────────────────────────────────
let S={
  tab:"Dashboard",trades:[],accounts:[],mentalHistory:[],insights:[],
  loading:true,error:null,
  viewTrade:null,editMode:false,showForm:false,
  formData:null,filterStrat:"ALL",filterResult:"ALL",
  showAddAccount:false,
  activeStrategy:"XAU V",checkedItems:{},
  mentalVals:{schlaf:7,energie:7,fokus:7,stress:3,motivation:8,koerper:7},
  filterStatStrat:"ALL",filterStatQuality:"ALL",
  kalcMode:"CFD",kalcCfg:{accountSize:100000,challengeCost:540,attempts:1,totalPayout:0,split:80,winRate:55,riskPct:1,rrRatio:2,ddLimit:10,profitTarget:10},
  insightForm:{auswahl:"",kategorie:"Setup-Idee",strategie:"XAU V",titel:"",beobachtung:"",detail:"",aktion:"",anpassung:"",imgBig:"",imgEntry:"",imgExit:""},
  showInsightForm:false,
  analyzerSignals:{"15M":"neutral","1H":"neutral","4H":"neutral","Daily":"neutral","Weekly":"neutral"},
  tfOrder:["15M","1H","4H","Daily","Weekly"]
};

function set(updates){Object.assign(S,updates);render();}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function mapTrade(t){return{...t,imgs:[t.img_big||null,t.img_entry||null,t.img_exit||null],propAccount:t.prop_account||"",confluences:Array.isArray(t.confluences)?t.confluences:[],rulebased:t.rulebased!==false,r:parseFloat(t.r)||0,entry:parseFloat(t.entry)||0,sl:parseFloat(t.sl)||0,tp:parseFloat(t.tp)||0};}
function mapAccount(a){return{...a,challengeCost:a.challenge_cost||0,totalPaid:a.total_paid||0,totalPayout:a.total_payout||0,ddLimit:a.dd_limit||10,profitTarget:a.profit_target||10,currentProfit:a.current_profit||0,currentDD:a.current_dd||0,riskPhase:a.risk_phase||1};}
function calcStats(trades){
  if(!trades.length)return{wr:0,pf:0,totalR:0,avgR:0,wins:0,losses:0};
  const wins=trades.filter(t=>t.result==="WIN"),losses=trades.filter(t=>t.result==="LOSS"),valid=trades.filter(t=>t.result!=="BE");
  const wr=valid.length?wins.length/valid.length*100:0;
  const gW=wins.reduce((s,t)=>s+t.r,0),gL=Math.abs(losses.reduce((s,t)=>s+t.r,0));
  const pf=gL>0?gW/gL:gW>0?99:0,totalR=trades.reduce((s,t)=>s+t.r,0);
  return{wr:+wr.toFixed(1),pf:+pf.toFixed(2),totalR:+totalR.toFixed(2),avgR:+(totalR/trades.length).toFixed(2),wins:wins.length,losses:losses.length};
}
function pill(color,text,small){const s=small?"1px 6px":"2px 8px",fs=small?"10px":"11px";return`<span class="pill pill-${color}" style="padding:${s};font-size:${fs}">${text}</span>`;}
function sc(label,value,color,sub){return`<div class="stat-card"><div class="slabel" style="margin-bottom:5px">${label}</div><div class="mono" style="color:${color||"#e8e4dc"};font-size:22px">${value}</div>${sub?`<div style="color:#6b6880;font-size:10px;margin-top:3px">${sub}</div>`:""}</div>`;}
function g(id){return document.getElementById(id);}
function gv(id){return g(id)?.value||"";}
function gc(id){return g(id)?.checked||false;}

// ── RENDER ─────────────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  if(S.loading){app.innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px"><div style="color:#c8a96e;font-size:32px;font-weight:800;letter-spacing:-0.02em">TraderMind</div><div style="color:#6b6880;font-size:13px">Lade Daten...</div></div>`;return;}
  if(S.error){app.innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px"><div style="color:#f87171;font-size:16px;font-weight:700">Verbindungsfehler</div><div style="color:#6b6880;font-size:12px;max-width:400px;text-align:center">${S.error}</div><button class="btn btn-accent" onclick="init()">Neu laden</button></div>`;return;}
  const TABS=["Dashboard","Prop Konten","Mental","Journal","Strategien","Statistik","Kalkulator","Insights"];
  const dots=S.accounts.map(a=>`<div style="display:flex;align-items:center;gap:5px"><div style="width:6px;height:6px;border-radius:50%;background:${a.phase==="Funded"?"#4ade80":a.phase==="Phase 2"?"#60a5fa":"#fbbf24"}"></div><span style="color:#6b6880;font-size:10px">${a.firm} ${a.phase}</span></div>`).join("");
  app.innerHTML=`
  <div style="border-bottom:1px solid #1f1f2e;padding:14px 22px;background:#111119;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:30px;height:30px;background:#c8a96e;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#000;font-size:15px">T</div>
      <div><div style="color:#e8e4dc;font-weight:800;font-size:15px;letter-spacing:-0.02em">TraderMind</div><div style="color:#6b6880;font-size:9px;letter-spacing:0.12em">TRADING OS</div></div>
    </div>
    <div style="display:flex;gap:10px">${dots}</div>
  </div>
  <div style="border-bottom:1px solid #1f1f2e;padding:0 22px;background:#111119;display:flex;overflow-x:auto;position:sticky;top:58px;z-index:99">
    ${TABS.map(t=>`<button class="tab-btn ${S.tab===t?"active":""}" onclick="setTab('${t}')">${t}</button>`).join("")}
  </div>
  <div style="padding:20px 22px;max-width:1100px;margin:0 auto">
    ${renderTab()}
  </div>`;
}

function setTab(t){set({tab:t,viewTrade:null,showForm:false,showInsightForm:false});}

function renderTab(){
  switch(S.tab){
    case "Dashboard":return renderDashboard();
    case "Prop Konten":return renderPropKonten();
    case "Mental":return renderMental();
    case "Journal":return renderJournal();
    case "Strategien":return renderStrategien();
    case "Statistik":return renderStatistik();
    case "Kalkulator":return renderKalkulator();
    case "Insights":return renderInsights();
    default:return "";
  }
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDashboard(){
  const stats=calcStats(S.trades);
  const today=new Date().toISOString().slice(0,10);
  const todayT=S.trades.filter(t=>t.date===today);
  const todayS=calcStats(todayT);
  let streak=0,sType=null;
  for(const t of S.trades){if(t.result==="BE")break;if(!sType)sType=t.result;if(t.result===sType)streak++;else break;}
  const totalPayout=S.accounts.reduce((s,a)=>s+a.totalPayout,0),totalPaid=S.accounts.reduce((s,a)=>s+a.totalPaid,0);
  const net=totalPayout-totalPaid;
  const dailyDD=todayT.filter(t=>t.result==="LOSS").reduce((s,t)=>s+Math.abs(t.r),0);
  const ddWarn=dailyDD>=1.5;

  const accs=S.accounts.map(a=>{
    const pp=Math.min((a.currentProfit/a.profitTarget*100)||0,100),dp=Math.min((a.currentDD/a.ddLimit*100)||0,100);
    return`<div style="padding:10px 12px;background:#111119;border-radius:8px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="color:#e8e4dc;font-weight:600;font-size:13px">${a.firm} ${Math.round((a.size||0)/1000)}k</span>
        <div style="display:flex;gap:6px;align-items:center">${pill(a.phase==="Funded"?"green":a.phase==="Phase 2"?"blue":"yellow",a.phase,true)}<span style="color:#c8a96e;font-size:11px;font-weight:700">${a.riskPhase}% Risk</span></div>
      </div>
      <div style="display:flex;gap:8px">
        <div style="flex:1"><div style="color:#6b6880;font-size:9px;margin-bottom:2px">Profit ${a.currentProfit}%/${a.profitTarget}%</div><div style="background:#2a2a3a;border-radius:3px;height:5px"><div style="width:${pp}%;height:100%;background:#4ade80;border-radius:3px"></div></div></div>
        <div style="flex:1"><div style="color:#6b6880;font-size:9px;margin-bottom:2px">DD ${a.currentDD}%/${a.ddLimit}%</div><div style="background:#2a2a3a;border-radius:3px;height:5px"><div style="width:${dp}%;height:100%;background:${dp>70?"#f87171":dp>50?"#fbbf24":"#4ade80"};border-radius:3px"></div></div></div>
      </div>
    </div>`;
  }).join("");

  const recent=S.trades.slice(0,5).map(t=>`
    <div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:#111119;border-radius:8px;font-size:12px;flex-wrap:wrap">
      ${pill(t.result==="WIN"?"green":t.result==="LOSS"?"red":"muted",t.result,true)}
      ${pill(t.quality==="A+"?"accent":"blue",t.quality||"–",true)}
      <span style="color:#e8e4dc;font-weight:600">${t.instrument}</span>
      <span style="color:#6b6880">${t.strategy}</span>
      <span class="mono" style="margin-left:auto;color:${t.r>0?"#4ade80":t.r<0?"#f87171":"#6b6880"}">${t.r>0?"+":""}${t.r}R</span>
      ${!t.rulebased?pill("red","Nicht regelb.",true):""}
    </div>`).join("");

  return`<div style="display:flex;flex-direction:column;gap:18px">
    ${ddWarn?`<div style="background:#f8717115;border:1px solid #f87171;border-radius:10px;padding:12px 16px;color:#f87171;font-size:13px">⚠️ <strong>DD-Warnung:</strong> Heute bereits ${dailyDD.toFixed(1)}R Verlust — näher als 2% Daily Limit!</div>`:""}
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      ${sc("Gesamt P&L",`${stats.totalR}R`,stats.totalR>0?"#4ade80":"#f87171",`${stats.wins}W / ${stats.losses}L`)}
      ${sc("Win Rate",`${stats.wr}%`,"#c8a96e",`PF: ${stats.pf}`)}
      ${sc("Heute",`${todayS.totalR}R`,todayS.totalR>0?"#4ade80":todayS.totalR<0?"#f87171":"#6b6880",`${todayT.length} Trades`)}
      ${sc("Streak",streak>0?`${streak}× ${sType==="WIN"?"WIN":"LOSS"}`:"–",sType==="WIN"?"#4ade80":sType==="LOSS"?"#f87171":"#6b6880")}
      ${sc("Net ROI",`${net>=0?"+":""}€${net.toLocaleString()}`,net>=0?"#4ade80":"#f87171","Prop Gesamt")}
    </div>
    <div class="grid2">
      <div class="card"><div class="slabel">Prop Konten</div>${accs||'<div style="color:#6b6880;font-size:12px">Noch keine Konten</div>'}</div>
      <div class="card"><div class="slabel">Letzte 5 Trades</div><div style="display:flex;flex-direction:column;gap:6px">${recent||'<div style="color:#6b6880;font-size:12px">Noch keine Trades</div>'}</div></div>
    </div>
    ${S.insights.length>0?`<div class="card"><div class="slabel">Letzte Insights</div><div style="display:flex;flex-direction:column;gap:8px">
      ${S.insights.slice(0,3).map(ins=>`<div style="padding:10px 12px;background:#111119;border-radius:8px;display:flex;gap:10px;align-items:flex-start">

// ── MENTAL ────────────────────────────────────────────────────────────────────
function renderMental(){
  const v=S.mentalVals;
  const sliders=[["schlaf","😴 Schlaf"],["energie","⚡ Energie"],["fokus","🎯 Fokus"],["stress","😤 Stress (niedrig = gut)"],["motivation","🔥 Motivation"],["koerper","💪 Körper / Fitness"]];
  const pos=["schlaf","energie","fokus","motivation","koerper"];
  const pS=pos.reduce((s,k)=>s+v[k],0)/pos.length;
  const score=((pS+(11-v.stress))/2).toFixed(1);
  const light=score>=7?"green":score>=5?"yellow":"red";
  const lCol=light==="green"?"#4ade80":light==="yellow"?"#fbbf24":"#f87171";
  const msg=score>=7?"✓ Grünes Licht — du bist ready to trade.":score>=5?"! Gelb — trade kleiner oder sei extra diszipliniert.":"✗ Rot — heute lieber kein Trading. Risiko für Fehler zu hoch.";

  const hist=S.mentalHistory.slice(0,7).map(m=>{
    const mS=((["schlaf","energie","fokus","motivation","koerper"].reduce((s,k)=>s+(m[k]||7),0)/5+(11-(m.stress||3)))/2).toFixed(1);
    const mc=mS>=7?"#4ade80":mS>=5?"#fbbf24":"#f87171";
    return`<div style="padding:8px 12px;background:#111119;border-radius:8px;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span style="color:#6b6880;font-size:11px">${m.date||"–"}</span>
      <span class="mono" style="color:${mc};font-size:13px">${mS}/10</span>
      ${m.note?`<span style="color:#6b6880;font-size:11px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.note}</span>`:""}
    </div>`;
  }).join("");

  return`<div style="display:flex;flex-direction:column;gap:16px;max-width:600px">
    <div class="card">
      <div class="slabel">Tages Check-in — Wie geht's dir heute?</div>
      ${sliders.map(([k,l])=>`<div style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="color:#e8e4dc;font-size:13px">${l}</span>
          <span class="mono" style="color:#c8a96e;font-size:14px" id="val_${k}">${v[k]} / 10</span>
        </div>
        <input type="range" min="1" max="10" value="${v[k]}" oninput="updateSlider('${k}',+this.value)">
      </div>`).join("")}
      <div style="margin-top:8px"><div style="color:#6b6880;font-size:10px;margin-bottom:6px">Notizblock — Was ist gerade los?</div>
      <textarea id="mental_note" rows="4" class="inp" style="resize:vertical" placeholder="Sport? Schritte? Stress im Job? Beschäftigt dich was? Das alles beeinflusst dein Trading..."></textarea></div>
      <button class="btn btn-accent" style="margin-top:12px" onclick="saveMental()">Check-in speichern</button>
    </div>
    <div style="padding:20px 24px;background:#15151f;border:2px solid ${lCol}33;border-radius:12px">
      <div style="display:flex;align-items:center;gap:14px">
        <div style="width:48px;height:48px;border-radius:50%;background:${lCol};display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${light==="green"?"✓":light==="yellow"?"!":"✗"}</div>
        <div><div style="color:#e8e4dc;font-weight:700;font-size:16px;margin-bottom:4px">Mental Score: ${score} / 10</div><div style="color:#6b6880;font-size:13px">${msg}</div></div>
      </div>
    </div>
    ${hist?`<div class="card"><div class="slabel">Letzte Check-ins</div>${hist}</div>`:""}
  </div>`;
}

// ── STATISTIK ─────────────────────────────────────────────────────────────────
function renderStatistik(){
  const fs=S.filterStatStrat,fq=S.filterStatQuality;
  const filtered=S.trades.filter(t=>(fs==="ALL"||t.strategy===fs)&&(fq==="ALL"||t.quality===fq));
  const stats=calcStats(filtered);
  const byDay=["Mo","Di","Mi","Do","Fr"].map((d,i)=>{const map={Mo:1,Di:2,Mi:3,Do:4,Fr:5};const t=filtered.filter(x=>new Date(x.date).getDay()===map[d]);return{day:d,r:+calcStats(t).totalR,n:t.length};});
  const byStrat=STRATEGIES.map(s=>{const t=filtered.filter(x=>x.strategy===s);const st=calcStats(t);return{name:s,...st,n:t.length};}).filter(s=>s.n>0);
  const byQuality=["A+","B","C"].map(q=>{const t=filtered.filter(x=>x.quality===q);const st=calcStats(t);return{q,wr:+st.wr,n:t.length};});
  const confStats=()=>{const all=[...new Set(filtered.flatMap(t=>t.confluences||[]))];return all.map(c=>{const wC=filtered.filter(t=>(t.confluences||[]).includes(c));const woC=filtered.filter(t=>!(t.confluences||[]).includes(c));return{c,withWR:+calcStats(wC).wr,withoutWR:+calcStats(woC).wr,n:wC.length};}).filter(x=>x.n>=2).sort((a,b)=>b.withWR-a.withWR);};
  const maxR=Math.max(...byDay.map(d=>Math.abs(d.r)),0.5);

  return`<div style="display:flex;flex-direction:column;gap:14px">
    <div class="card">
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <div style="color:#6b6880;font-size:10px">Filter:</div>
        <select style="background:#111119;border:1px solid #1f1f2e;border-radius:6px;padding:5px 9px;color:#e8e4dc;font-size:11px;font-family:inherit" onchange="set({filterStatStrat:this.value})">
          <option value="ALL">Alle Strategien</option>${STRATEGIES.map(s=>`<option ${fs===s?"selected":""}>${s}</option>`).join("")}
        </select>
        <select style="background:#111119;border:1px solid #1f1f2e;border-radius:6px;padding:5px 9px;color:#e8e4dc;font-size:11px;font-family:inherit" onchange="set({filterStatQuality:this.value})">
          ${["ALL","A+","B","C"].map(q=>`<option value="${q}" ${fq===q?"selected":""}>${q==="ALL"?"Alle Qualitäten":q}</option>`).join("")}
        </select>
        <span style="color:#6b6880;font-size:10px">${filtered.length} Trades</span>
      </div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      ${sc("Win Rate",`${stats.wr}%`,"#c8a96e")}${sc("Profit Factor",stats.pf,"#60a5fa")}${sc("Gesamt R",`${stats.totalR}R`,stats.totalR>0?"#4ade80":"#f87171")}${sc("Ø R/Trade",stats.avgR,stats.avgR>0?"#4ade80":"#f87171")}
    </div>
    <div class="grid2">
      <div class="card">
        <div class="slabel">P&L nach Wochentag</div>
        <div style="display:flex;gap:8px;align-items:flex-end;height:130px;padding:10px 0">
          ${byDay.map(d=>`<div class="bar-day">
            <div style="font-size:10px;color:${d.r>0?"#4ade80":d.r<0?"#f87171":"#6b6880"}" class="mono">${d.r!==0?(d.r>0?"+":"")+d.r+"R":""}</div>
            <div style="width:100%;height:${Math.max(4,Math.abs(d.r)/maxR*80)}px;background:${d.r>0?"#4ade80":d.r<0?"#f87171":"#2a2a3a"};border-radius:3px 3px 0 0"></div>
            <div style="color:#6b6880;font-size:10px">${d.day}</div>
            <div style="color:#2a2a3a;font-size:9px">${d.n>0?d.n+"T":""}</div>
          </div>`).join("")}
        </div>
      </div>
      <div class="card">
        <div class="slabel">Setup-Qualität vs. Win Rate</div>
        <div style="display:flex;flex-direction:column;gap:10px;padding-top:8px">
          ${byQuality.map(q=>`<div style="display:flex;align-items:center;gap:10px">
            ${pill(q.q==="A+"?"accent":"blue",q.q)}
            <div style="flex:1;background:#111119;border-radius:4px;height:10px;overflow:hidden"><div style="width:${q.wr}%;height:100%;background:${q.wr>=60?"#4ade80":q.wr>=40?"#fbbf24":"#f87171"};border-radius:4px"></div></div>
            <span class="mono" style="color:#e8e4dc;font-size:12px;min-width:40px">${q.wr}%</span>
            <span style="color:#6b6880;font-size:10px">(${q.n})</span>
          </div>`).join("") || '<div style="color:#6b6880;font-size:12px">Noch keine Daten</div>'}
        </div>
      </div>
    </div>
    <div class="card">
      <div class="slabel">Performance pro Strategie</div>
      <div style="display:flex;flex-direction:column;gap:7px">
        ${byStrat.map(s=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:#111119;border-radius:8px">
          <span style="color:#e8e4dc;font-weight:600;font-size:12px;min-width:130px">${s.name}</span>
          <span style="color:#6b6880;font-size:9px">WR</span><span style="color:#c8a96e;font-weight:700;font-size:12px">${s.wr}%</span>
          <span style="color:#6b6880;font-size:9px">PF</span><span style="color:#60a5fa;font-weight:700;font-size:12px">${s.pf}</span>
          <span style="color:#6b6880;font-size:9px">R</span><span style="color:${s.totalR>0?"#4ade80":"#f87171"};font-weight:700;font-size:12px">${s.totalR>0?"+":""}${s.totalR}R</span>
          <span style="color:#2a2a3a;font-size:10px;margin-left:auto">${s.n} Trades</span>
        </div>`).join("") || '<div style="color:#6b6880;font-size:12px">Noch keine Daten</div>'}
      </div>
    </div>
    ${confStats().length>0?`<div class="card">
      <div class="slabel">Konfluenz-Analyse — WR mit vs. ohne</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${confStats().slice(0,8).map(c=>`<div style="display:flex;align-items:center;gap:10px">
          <span style="color:#e8e4dc;font-size:11px;min-width:180px">${c.c}</span>
          <span style="color:#6b6880;font-size:9px">mit</span>
          <div style="width:70px;background:#2a2a3a;border-radius:3px;height:7px;overflow:hidden"><div style="width:${c.withWR}%;height:100%;background:#4ade80;border-radius:3px"></div></div>
          <span class="mono" style="color:#4ade80;font-size:11px;min-width:34px">${c.withWR}%</span>
          <span style="color:#6b6880;font-size:9px">ohne</span>
          <div style="width:70px;background:#2a2a3a;border-radius:3px;height:7px;overflow:hidden"><div style="width:${c.withoutWR}%;height:100%;background:#fbbf24;border-radius:3px"></div></div>
          <span class="mono" style="color:#fbbf24;font-size:11px;min-width:34px">${c.withoutWR}%</span>
          <span style="color:#2a2a3a;font-size:10px">n=${c.n}</span>
        </div>`).join("")}
      </div>
    </div>`:""}
  </div>`;
}

// ── KALKULATOR ────────────────────────────────────────────────────────────────
function renderKalkulator(){
  const mode=S.kalcMode;
  const cfg={...S.kalcCfg};
  const{challengeCost,attempts,totalPayout,winRate,riskPct,rrRatio,ddLimit,profitTarget}=cfg;
  const totalInvested=challengeCost*attempts,net=totalPayout-totalInvested;
  const roi=totalInvested>0?((net/totalInvested)*100).toFixed(1):0;
  const avgTradeR=(winRate/100*riskPct*rrRatio)-((1-winRate/100)*riskPct);
  const tradesNeeded=Math.ceil(profitTarget/Math.max(avgTradeR,0.01));
  const maxLosses=Math.floor(ddLimit/riskPct);
  const passChance=Math.max(0,Math.min(99,riskPct<=1?75:riskPct<=2?55:riskPct<=3?35:15));
  const risks=[0.25,0.5,0.75,1,1.25,1.5,1.75,2,2.5,3,4,5];
  const maxSc=Math.max(...risks.map(r=>{const ev=(winRate/100*(r*rrRatio))-((1-winRate/100)*r);const p=Math.floor(ddLimit/r);return Math.max(0,ev*Math.min(p/5,1));}),0.01);

  return`<div style="display:flex;flex-direction:column;gap:14px">
    <div style="display:flex;gap:8px">
      ${["CFD","Futures"].map(m=>`<button style="background:${mode===m?"#c8a96e":"transparent"};color:${mode===m?"#000":"#6b6880"};border:1px solid ${mode===m?"#c8a96e":"#1f1f2e"};border-radius:7px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit" onclick="set({kalcMode:'${m}'})">${m} Prop Firm</button>`).join("")}
    </div>
    <div class="grid2">
      <div class="card">
        <div class="slabel">${mode==="CFD"?"CFD Settings (z.B. FTMO)":"Futures Settings (z.B. Tradeify)"}</div>
        <div style="display:flex;flex-direction:column;gap:9px">
          ${[["Account Size (€)","accountSize"],["Challenge Kosten (€)","challengeCost"],["Anzahl Versuche","attempts"],["Ausgezahlte Payouts (€)","totalPayout"],["Payout Split (%)","split"],["DD Limit (%)","ddLimit"],["Profit Target (%)","profitTarget"]].map(([l,k])=>`<div style="display:flex;justify-content:space-between;align-items:center"><span style="color:#6b6880;font-size:12px">${l}</span><input type="number" value="${cfg[k]}" oninput="updateKalc('${k}',this.value)" style="width:110px;background:#111119;border:1px solid #1f1f2e;border-radius:6px;padding:5px 8px;color:#e8e4dc;font-size:12px;text-align:right;font-family:inherit"></div>`).join("")}
        </div>
      </div>
      <div class="card">
        <div class="slabel">Strategie-Risikoprofil</div>
        <div style="display:flex;flex-direction:column;gap:12px">
          ${[["Win Rate (%)","winRate",30,80,1],["Risk pro Trade (%)","riskPct",0.25,5,0.25],["RR Ratio (1:X)","rrRatio",1,5,0.25]].map(([l,k,min,max,step])=>`<div>
            <div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="color:#e8e4dc;font-size:12px">${l}</span><span class="mono" style="color:#c8a96e;font-size:14px">${cfg[k]}${k==="rrRatio"?"":"%"}</span></div>
            <input type="range" min="${min}" max="${max}" step="${step}" value="${cfg[k]}" oninput="updateKalc('${k}',this.value)">
          </div>`).join("")}
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">
            <div style="background:#111119;border-radius:8px;padding:10px 12px"><div style="color:#6b6880;font-size:9px">Max Verluste bis DD-Limit</div><div class="mono" style="color:${maxLosses<5?"#f87171":maxLosses<8?"#fbbf24":"#4ade80"};font-size:22px">${maxLosses}×</div></div>
            <div style="background:#111119;border-radius:8px;padding:10px 12px"><div style="color:#6b6880;font-size:9px">Ø Erwartungswert/Trade</div><div class="mono" style="color:${avgTradeR>0?"#4ade80":"#f87171"};font-size:22px">${avgTradeR.toFixed(2)}%</div></div>
          </div>
        </div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px">
      ${[["Gesamt investiert",`€${totalInvested.toLocaleString()}`,"#f87171"],["Gesamt ausgezahlt",`€${totalPayout.toLocaleString()}`,"#4ade80"],["Netto P&L",`${net>=0?"+":""}€${net.toLocaleString()}`,net>=0?"#4ade80":"#f87171"],["ROI",`${roi}%`,parseFloat(roi)>=0?"#4ade80":"#f87171"],["Pass-Chance",`~${passChance}%`,passChance>=60?"#4ade80":passChance>=40?"#fbbf24":"#f87171"],["Trades für Target",`~${tradesNeeded}`,"#60a5fa"]].map(([l,v,c])=>sc(l,v,c)).join("")}
    </div>
    <div class="card">
      <div class="slabel">Optimaler Risk-Bereich bei ${ddLimit}% DD Limit</div>
      <div style="display:flex;gap:3px;align-items:flex-end;height:80px">
        ${risks.map(r=>{const ev=(winRate/100*(r*rrRatio))-((1-winRate/100)*r);const p=Math.floor(ddLimit/r);const sc2=Math.max(0,ev*Math.min(p/5,1));const col=r<=1?"#4ade80":r<=2?"#fbbf24":"#f87171";return`<div onclick="updateKalc('riskPct','${r}')" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer">
          <div style="width:100%;height:${Math.max(4,sc2/maxSc*60)}px;background:${col};border-radius:3px 3px 0 0;opacity:${r==riskPct?1:0.4};box-sizing:border-box;${r==riskPct?"border:2px solid #fff":""}"></div>
          <span style="color:${r==riskPct?"#c8a96e":"#6b6880"};font-size:8px">${r}%</span>
        </div>`;}).join("")}
      </div>
      <div style="margin-top:6px;font-size:10px;color:#6b6880">🟢 Optimal &nbsp;🟡 Akzeptabel &nbsp;🔴 Zu aggressiv — Klicken zum Auswählen</div>
    </div>
  </div>`;
}

    <div style="display:flex;flex-direction:column;gap:10px">
      ${S.insights.map(ins=>`<div class="insight-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            ${pill(catColors[ins.kategorie]||"muted",ins.kategorie||"–")}
            ${ins.strategie?pill("blue",ins.strategie,true):""}
            ${ins.auswahl?`<span style="color:#c8a96e;font-size:12px;font-weight:600">${ins.auswahl}</span>`:""}
          </div>
          <button style="background:transparent;color:#f87171;border:1px solid #f8717133;border-radius:5px;padding:3px 7px;font-size:10px;cursor:pointer" onclick="deleteInsight(${ins.id})">🗑</button>
        </div>
        ${ins.titel?`<div style="color:#e8e4dc;font-size:14px;font-weight:700;margin-bottom:10px">${ins.titel}</div>`:""}
        ${ins.beobachtung?`<div class="insight-field"><div class="insight-label">Beobachtung</div><div class="insight-value">${ins.beobachtung}</div></div>`:""}
        ${ins.detail?`<div class="insight-field"><div class="insight-label">Detail</div><div class="insight-value" style="color:#6b6880">${ins.detail}</div></div>`:""}
        ${ins.aktion?`<div class="insight-field"><div class="insight-label">Mögliche Aktion</div><div class="insight-value">${ins.aktion}</div></div>`:""}
        ${ins.anpassung?`<div class="insight-field"><div class="insight-label">Anpassung</div><div class="insight-value" style="color:#6b6880">${ins.anpassung}</div></div>`:""}
        ${(ins.img_big||ins.img_entry||ins.img_exit)?`<div style="display:flex;gap:8px;margin-top:10px">
          ${[["Big Picture",ins.img_big],["Entry",ins.img_entry],["Exit",ins.img_exit]].filter(([,u])=>u).map(([l,u])=>`<a href="${u}" target="_blank" style="color:#c8a96e;font-size:11px;font-weight:600;text-decoration:none;background:#c8a96e22;border:1px solid #c8a96e44;border-radius:6px;padding:4px 10px">↗ ${l}</a>`).join("")}
        </div>`:""}
        <div style="margin-top:10px;color:#2a2a3a;font-size:10px">${ins.created_at?new Date(ins.created_at).toLocaleString("de-DE"):""}</div>
      </div>`).join("") || '<div style="color:#6b6880;font-size:13px;text-align:center;padding:40px 0">Noch keine Insights. Füge deinen ersten Markt-Insight hinzu.</div>'}
    </div>
  </div>`;
}

// ── EVENT HANDLERS ────────────────────────────────────────────────────────────
function updateSlider(k,v){
  S.mentalVals[k]=v;
  const el=document.getElementById(`val_${k}`);
  if(el)el.textContent=`${v} / 10`;
}

function updateStrategy(val){S.formData.strategy=val;S.formData.instrument=(INSTRUMENTS[val]||[])[0]||"";render();}
function toggleConf(c){if(!S.formData.confluences)S.formData.confluences=[];const ci=S.formData.confluences.indexOf(c);if(ci>-1)S.formData.confluences.splice(ci,1);else S.formData.confluences.push(c);render();}
function toggleCheck(k){S.checkedItems[k]=!S.checkedItems[k];render();}
function resetChecklist(strat){Object.keys(S.checkedItems).filter(k=>k.startsWith(strat)).forEach(k=>delete S.checkedItems[k]);render();}
function setAnalyzer(tf,val){S.analyzerSignals[tf]=val;render();}
function updateKalc(k,v){if(!S.kalcCfg)S.kalcCfg={};S.kalcCfg[k]=parseFloat(v)||0;render();}
function openNewForm(){S.formData={date:new Date().toISOString().slice(0,10),time:"",instrument:"XAUUSD",strategy:"XAU V",session:"London",direction:"LONG",entry:"",sl:"",tp:"",result:"WIN",r:"",quality:"A+",rulebased:true,confluences:[],emotion:"Calm",notes:"",imgs:[null,null,null],propAccount:""};set({showForm:true,editMode:false});}
function closeForm(){set({showForm:false,editMode:false});}
function viewTradeById(id){set({viewTrade:S.trades.find(x=>x.id===id)||null});}
function startEdit(){if(!S.viewTrade)return;const t=S.viewTrade;S.formData={...t,r:String(t.r),entry:String(t.entry||""),sl:String(t.sl||""),tp:String(t.tp||"")};set({showForm:true,editMode:true});}
function editTradeById(id){const t=S.trades.find(x=>x.id===id);if(!t)return;S.formData={...t,r:String(t.r),entry:String(t.entry||""),sl:String(t.sl||""),tp:String(t.tp||"")};set({showForm:true,editMode:true,viewTrade:null});}
function editAccount(id){/* TODO: inline edit */alert("Konto-Bearbeitung: Bitte Konto löschen und neu anlegen.");}

function getFormPayload(){
  return{
    date:gv("f_date"),time:gv("f_time"),instrument:gv("f_instrument"),strategy:gv("f_strategy"),
    session:gv("f_session"),direction:gv("f_direction"),entry:parseFloat(gv("f_entry"))||0,
    sl:parseFloat(gv("f_sl"))||0,tp:parseFloat(gv("f_tp"))||0,result:gv("f_result"),
    r:parseFloat(gv("f_r"))||0,quality:gv("f_quality"),rulebased:gc("f_rulebased"),
    confluences:S.formData?.confluences||[],emotion:gv("f_emotion"),notes:gv("f_notes"),
    img_big:gv("f_img0")||null,img_entry:gv("f_img1")||null,img_exit:gv("f_img2")||null,
    prop_account:gv("f_account")||""
  };
}

async function saveForm(){
  const p=getFormPayload();if(!p.r)return;
  if(S.editMode&&S.formData?.id){
    try{await db.trades.upd(S.formData.id,p);const u=mapTrade({...p,id:S.formData.id});set({trades:S.trades.map(t=>t.id===S.formData.id?u:t),showForm:false,editMode:false,viewTrade:u});}
    catch(e){alert("Fehler: "+e.message);}
  }else{
    try{const res=await db.trades.add(p);const saved=Array.isArray(res)?res[0]:res;set({trades:[mapTrade(saved),...S.trades],showForm:false});}
    catch(e){alert("Fehler: "+e.message);}
  }
}

async function deleteTrade(id){
  if(!confirm("Trade wirklich löschen?"))return;
  try{await db.trades.del(id);set({trades:S.trades.filter(t=>t.id!==id),viewTrade:null});}
  catch(e){alert("Fehler: "+e.message);}
}

async function saveAccount(){
  const rBP={"Phase 1":2.0,"Phase 2":1.5,"Funded":0.75};
  const phase=gv("acc_phase");
  const p={firm:gv("acc_firm"),size:parseFloat(gv("acc_size"))||100000,phase,currency:gv("acc_currency"),challenge_cost:parseFloat(gv("acc_cost"))||0,attempts:parseInt(gv("acc_attempts"))||1,total_paid:parseFloat(gv("acc_paid"))||0,total_payout:parseFloat(gv("acc_payout"))||0,dd_limit:parseFloat(gv("acc_dd"))||10,profit_target:parseFloat(gv("acc_target"))||10,current_profit:parseFloat(gv("acc_profit"))||0,current_dd:parseFloat(gv("acc_curdd"))||0,risk_phase:rBP[phase]||1,split:parseFloat(gv("acc_split"))||80};
  try{const res=await db.accounts.add(p);const saved=Array.isArray(res)?res[0]:res;set({accounts:[...S.accounts,mapAccount(saved)],showAddAccount:false});}
  catch(e){alert("Fehler: "+e.message);}
}

async function deleteAccount(id){
  if(!confirm("Konto löschen?"))return;
  try{await db.accounts.del(id);set({accounts:S.accounts.filter(a=>a.id!==id)});}
  catch(e){alert("Fehler: "+e.message);}
}

async function saveMental(){
  const p={date:new Date().toISOString().slice(0,10),...S.mentalVals,note:gv("mental_note")||""};
  try{const res=await db.mental.add(p);const saved=Array.isArray(res)?res[0]:res;set({mentalHistory:[saved,...S.mentalHistory]});alert("✓ Check-in gespeichert!");}
  catch(e){alert("Fehler: "+e.message);}
}

async function saveInsight(){
  const p={auswahl:gv("ins_auswahl"),kategorie:gv("ins_kat"),strategie:gv("ins_strat"),titel:gv("ins_titel"),beobachtung:gv("ins_beo"),detail:gv("ins_det"),aktion:gv("ins_akt"),anpassung:gv("ins_anp"),img_big:gv("ins_img0")||null,img_entry:gv("ins_img1")||null,img_exit:gv("ins_img2")||null};
  try{const res=await db.insights.add(p);const saved=Array.isArray(res)?res[0]:res;set({insights:[saved,...S.insights],showInsightForm:false});}
  catch(e){alert("Fehler: "+e.message);}
}

async function deleteInsight(id){
  if(!confirm("Insight löschen?"))return;
  try{await db.insights.del(id);set({insights:S.insights.filter(i=>i.id!==id)});}
  catch(e){alert("Fehler: "+e.message);}
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init(){
  set({loading:true,error:null});
  try{
    // Try to load insights - table might not exist yet
    let insightsData=[];
    try{insightsData=await db.insights.list();}catch(e){console.log("Insights table not yet created");}
    const[t,a,m]=await Promise.all([db.trades.list(),db.accounts.list(),db.mental.list()]);
    set({trades:t.map(mapTrade),accounts:a.map(mapAccount),mentalHistory:m||[],insights:insightsData,loading:false});
  }catch(e){set({loading:false,error:e.message});}
}

init();
</script>
</body>
</html>
