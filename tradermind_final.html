async function sbReq(path, opts = {}) {
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers: {
      "apikey": SB_KEY,
      "Authorization": `Bearer ${SB_KEY}`,
      "Content-Type": "application/json",
      "Prefer": opts.prefer ?? "return=representation",
      ...(opts.headers || {}),
    },
    method: opts.method || "GET",
    body: opts.body,
  });
  const text = await res.text();
  if (!res.ok) throw new Error(text);
  return text ? JSON.parse(text) : [];
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function mapTrade(t) {
  return {
    ...t,
    imgs: [t.img_big||null, t.img_entry||null, t.img_exit||null],
    propAccount: t.prop_account || "",
    confluences: Array.isArray(t.confluences) ? t.confluences : [],
    rulebased: t.rulebased !== false,
    r: parseFloat(t.r) || 0,
    entry: parseFloat(t.entry) || 0,
    sl: parseFloat(t.sl) || 0,
    tp: parseFloat(t.tp) || 0,
  };
}

function mapAccount(a) {
  return {
    ...a,
    challengeCost: a.challenge_cost || 0,
    totalPaid: a.total_paid || 0,
    totalPayout: a.total_payout || 0,
    ddLimit: a.dd_limit || 10,
    profitTarget: a.profit_target || 10,
    currentProfit: a.current_profit || 0,
    currentDD: a.current_dd || 0,
    riskPhase: a.risk_phase || 1,
  };
}

function calcStats(trades) {
  if (!trades.length) return { wr:0, pf:0, totalR:0, avgR:0, wins:0, losses:0 };
  const wins = trades.filter(t => t.result === "WIN");
  const losses = trades.filter(t => t.result === "LOSS");
  const valid = trades.filter(t => t.result !== "BE");
  const wr = valid.length ? wins.length / valid.length * 100 : 0;
  const gW = wins.reduce((s,t) => s + t.r, 0);
  const gL = Math.abs(losses.reduce((s,t) => s + t.r, 0));
  const pf = gL > 0 ? gW / gL : gW > 0 ? 99 : 0;
  const totalR = trades.reduce((s,t) => s + t.r, 0);
  return { wr:+wr.toFixed(1), pf:+pf.toFixed(2), totalR:+totalR.toFixed(2), avgR:+(totalR/trades.length).toFixed(2), wins:wins.length, losses:losses.length };
}

      TABS.map(t => React.createElement("button", { key:t, onClick:()=>setTab(t), style:{ background:"transparent", border:"none", borderBottom:tab===t?`2px solid ${C.accent}`:"2px solid transparent", color:tab===t?C.accent:C.muted, padding:"11px 14px", fontSize:11, fontWeight:tab===t?700:400, cursor:"pointer", whiteSpace:"nowrap", letterSpacing:"0.05em" } }, t))
    ),
    React.createElement("div", { style:{ padding:"20px 22px", maxWidth:1080, margin:"0 auto" } },
      tab==="Dashboard" && React.createElement(DashboardTab, { trades, accounts }),
      tab==="Prop Konten" && React.createElement(PropKontenTab, { accounts, setAccounts }),
      tab==="Mental" && React.createElement(MentalTab, { mentalHistory, setMentalHistory }),
      tab==="Journal" && React.createElement(JournalTab, { trades, setTrades, accounts }),
      tab==="Strategien" && React.createElement(StrategienTab),
      tab==="Statistik" && React.createElement(StatistikTab, { trades }),
      tab==="Kalkulator" && React.createElement(KalkulatorTab)
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
